name: Daily CWV Fetch Cron

on:
  schedule:
    # 04:30 AM UTC = 10:00 AM IST
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Fetch Endpoint
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "Error: APP_URL secret is not set. Please add it to your repository secrets (e.g. https://your-site.com)."
            exit 1
          fi
          
          echo "Triggering API route at ${{ secrets.APP_URL }}/api/cron..."
          
          curl -X GET "${{ secrets.APP_URL }}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail
